<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CrewFlow | Crew Schedule Exchange</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Crew Schedule Exchange</p>
          <h1>CrewFlow</h1>
        </div>
        <p class="topbar-copy">
          Responsive demo for crew schedules, open time, swap validation, and
          rule-driven approvals.
        </p>
      </header>
      <main id="app" class="app-root" aria-live="polite"></main>
      <noscript>
        <section class="card">
          <p class="eyebrow">Preview blocked</p>
          <h2>JavaScript is turned off in Safari.</h2>
          <p>Enable JavaScript for Safari to load the interactive CrewFlow preview.</p>
        </section>
      </noscript>
    </div>
    <script>
      (function () {
        var app = document.getElementById("app");
        if (!app) {
          return;
        }

        function showBootMessage(title, body) {
          app.innerHTML =
            '<section class="card"><p class="eyebrow">Preview status</p><h2>' +
            title +
            "</h2><p>" +
            body +
            "</p></section>";
        }

        function loadScript(src, label, verify) {
          return new Promise(function (resolve, reject) {
            var script = document.createElement("script");
            script.src = src;
            script.async = false;
            script.onload = function () {
              try {
                if (verify && !verify()) {
                  reject(
                    new Error(label + " loaded, but the expected app object was missing."),
                  );
                  return;
                }
                resolve();
              } catch (error) {
                reject(error);
              }
            };
            script.onerror = function () {
              reject(new Error(label + " failed to load from " + src + "."));
            };
            document.body.appendChild(script);
          });
        }

        window.addEventListener(
          "error",
          function (event) {
            showBootMessage(
              "A browser error stopped the preview.",
              (event && event.message) || "Unknown JavaScript error.",
            );
          },
          true,
        );

        showBootMessage(
          "Loading interactive preview...",
          "Checking each app script now.",
        );

        loadScript("/src/data.js", "Data layer", function () {
          return !!window.CrewFlowData;
        })
          .then(function () {
            return loadScript("/src/engine.js", "Legality engine", function () {
              return !!window.CrewFlowEngine;
            });
          })
          .then(function () {
            return loadScript("/src/app.js", "App bootstrap");
          })
          .catch(function (error) {
            showBootMessage(
              "A browser error stopped the preview.",
              (error && error.message) || "Unknown loader error.",
            );
          });
      })();
    </script>
  </body>
</html>
